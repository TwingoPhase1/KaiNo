<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background squircle PWA gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    
    <!-- Bag body 3D white gloss gradient -->
    <linearGradient id="bagGrad" x1="96" y1="68" x2="96" y2="156" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f3f4f6" />
    </linearGradient>

    <!-- Drop shadow for the bag -->
    <filter id="shadow" x="0" y="0" width="192" height="192" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>

    <!-- Cutout mask to make the checkmark transparent and let the background gradient shine through -->
    <mask id="bagMask">
      <!-- White is visible -->
      <rect x="0" y="0" width="192" height="192" fill="#ffffff" />
      <!-- Black is cut out -->
      <path d="M80 110 L92 122 L116 94" stroke="#000000" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </mask>
  </defs>

  <!-- PWA background canvas (squircle rx=48) -->
  <rect width="192" height="192" rx="48" fill="url(#bgGrad)" />

  <!-- Shopping Bag Handle -->
  <path d="M76 68 C76 44, 116 44, 116 68" stroke="#ffffff" stroke-width="8" stroke-linecap="round" fill="none" />

  <!-- Shopping Bag Body with checkmark cutout mask & shadow -->
  <g filter="url(#shadow)">
    <path d="M64 68 H128 C133 68, 137 72, 136 77 L132 144 C131 151, 125 156, 118 156 H74 C67 156, 61 151, 60 144 L56 77 C55 72, 59 68, 64 68 Z" fill="url(#bagGrad)" mask="url(#bagMask)" />
  </g>
</svg>
